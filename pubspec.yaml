name: my_health_trail
description: Track your blood sugar, blood pressure, and weight.

publish_to: 'none'

version: 1.0.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0

  
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Export
  csv: ^5.1.1
  pdf: ^3.10.7
  share_plus: ^10.0.0
  
  # Icons
  cupertino_icons: ^1.0.6
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
